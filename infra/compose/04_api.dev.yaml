services:
  api:
    build:
      context: ../backend
      dockerfile: Containerfile
    container_name: api
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    environment:
      # 비밀번호는 infra/.env 파일에서 주입됩니다.
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@pgsql:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password123!}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - TZ=Asia/Seoul
    volumes:
      - ../backend:/app:Z
      - ./data/logs/api:/app/logs:Z
    networks:
      - sfms-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

services:
  api:
    build:
      context: ../backend
      dockerfile: Containerfile
    container_name: api
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    environment:
      # DB_PASSWORD와 REDIS_PASSWORD는 infra/.env 또는 쉘 환경변수에서 주입되어야 합니다.
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@pgsql:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password123!}@redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - TZ=Asia/Seoul
    volumes:
      - ../backend:/app:Z
      - ./data/logs/api:/app/logs:Z
    networks:
      - sfms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    #           gid: "0" # 기본적으로 root 그룹
    #           mode: 0400
    #         - source: nginx-key
    #           target: /run/secrets/nginx-key
    #           uid: "0" # 기본적으로 root 유저
    #           gid: "0" # 기본적으로 root 그룹
    #           mode: 0400
    #         - source: nginx-cert
    #           target: /run/secrets/nginx-cert
    #           uid: "0" # 기본적으로 root 유저
    #           gid: "0" # 기본적으로 root 그룹
    #           mode: 0444

    # ====================================================================
    # 6. Database Admin (PgAdmin)
    # 브라우저에서 접속하여 엑셀처럼 DB 테이블을 조회하고 SQL을 날릴 수 있는 관리자 도구입니다.
    # ====================================================================
    pgadm:
        image: dpage/pgadmin4
        container_name: pgadm
        restart: always
        user: "5050:5050"
        entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint-wrapper.sh"]
        environment:
            - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL} # 로그인에 사용할 이메일 아이디
            - PGADMIN_DEFAULT_PASSWORD_FILE=/run/secrets/pgadm-password # 로그인 비밀번호 (시크릿 파일 사용)
            - PGADMIN_LISTEN_PORT=80
            - TZ=Asia/Seoul
        volumes:
            - ./pgadm/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
            - ./data/pgadm:/var/lib/pgadmin # 계정 설정 및 쿼리 기록 저장용 로컬 폴더
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro

        networks:
            - sfms-net
        secrets:
            - source: pgadm-password
              target: /run/secrets/pgadm-password
            #   uid: "5050" # 기본적으로 root 유저
            #   gid: "5050" # 기본적으로 root 그룹
            #   mode: 400
        healthcheck:
            test:
                - "CMD-SHELL"
                - |
                    if [ -f /certs/server.cert ]; then
                        wget -q --no-check-certificate -O /dev/null https://localhost:443/misc/ping
                    else
                        wget -q -O /dev/null http://localhost:80/misc/ping
                    fi
            interval: 30s
            timeout: 10s
            retries: 5

    # ====================================================================
    # 7. Offline Version Control (Gitea)
    # 사내망(오프라인)에서도 소스 코드를 안전하게 관리하기 위한 경량화 로컬 Git 서버입니다.
    # ====================================================================
    gitea:
        image: gitea/gitea:latest
        container_name: gitea
        depends_on:
            pgsql:
                condition: service_healthy # DB가 먼저 완전히 켜진 후에 Gitea를 실행합니다.
        restart: always
        entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint-wrapper.sh"]
        environment:
            - USER_UID=1000 # Podman Rootless 환경에서 권한 꼬임을 방지하기 위한 호스트 유저 매핑
            - USER_GID=1000
            - TZ=Asia/Seoul

            # app.ini 설정
            # [database]
            - GITEA__database__DB_TYPE=postgres
            - GITEA__database__HOST=pgsql:5432
            - GITEA__database__NAME=${DB_NAME} # 환경 변수 연동
            - GITEA__database__USER=${DB_USER}
            - GITEA__database__PASSWD_FILE=/run/secrets/gitea-password # <-- Secret password 파일위치
            # 사설 인증서이므로 검증을 건너뛰거나(skip-verify), prefer 모드 사용
            # 주의: 사설 인증서 사용 시 'verify-full'을 쓰려면 CA 인증서를 Gitea 컨테이너에도 넣어야 합니다.
            # 일단 접속이 안 된다면 'disable'로 테스트 후 'require'로 올리세요.
            - GITEA__database__SSL_MODE=require # verify-full, require, disable
            # - GITEA__database__SSL_CA_CERT=/certs/ca.crt

            # [server]
            # - GITEA__server__DOMAIN=localhost         # 기본값은 미설정
            # - GITEA__server__SSH_DOMAIN=localhost     # 기본값은 미설정
            - GITEA__server__HTTP_PORT=3000
            # - GITEA__server__REDIRECT_OTHER_PORT: true
            - GITEA__server__PROTOCOL=http
            - GITEA__server__ROOT_URL=http://localhost:3000/ # 기본값은 미설정

            # COMMENT OUT LETSENCRYPT VALUES IF YOU HAVE OWN CERTS FILES!!
            # - GITEA__server__ENABLE_ACME=true
            # - GITEA__server__ACME_ACCEPTTOS=true
            # - GITEA__server__ACME_DIRECTORY=https
            # - GITEA__server__ACME_EMAIL= my@email.com

            # OPTIONAL. OWN CERTS FILES IF YOU HAVE THE ONES
            # - GITEA__server__CERT_FILE=/certs/server.cert
            # - GITEA__server__KEY_FILE=/certs/server.key
            # [security]
            #  - GITEA__security__SECRET_KEY=[value returned by generate secret SECRET_KEY]
            #  - GITEA__security__INTERNAL_TOKEN=[value returned by generate secret INTERNAL_TOKEN]
            # [mailer]
            #  - GITEA__mailer__ENABLED=true
            #  - GITEA__mailer__FROM=${GITEA__mailer__FROM:?GITEA__mailer__FROM not set}
            #  - GITEA__mailer__PROTOCOL=smtps
            #  - GITEA__mailer__SMTP_ADDR=${GITEA__mailer__SMTP_ADDR:?GITEA__mailer__SMTP_ADDR not set}
            #  - GITEA__mailer__SMTP_PORT=${GITEA__mailer__SMTP_PORT:?GITEA__mailer__SMTP_PORT not set}
            #  - GITEA__mailer__USER=${GITEA__mailer__USER:-apikey}
            #  - GITEA__mailer__PASSWD="""${GITEA__mailer__PASSWD:?GITEA__mailer__PASSWD not set}""""
        volumes:
            - ./gitea/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
            - ./data/gitea/conf:/data/gitea/conf # 설정(Brain) 파일 저장 위치
            - ./data/gitea/data:/data # 소스 코드 저장소(레포지토리) 실제 저장 위치
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - sfms-net
        secrets:
            - source: gitea-password
              target: /run/secrets/gitea-password
            #  uid: "1000" # 기본적으로 root 유저
            #  gid: "1000" # 기본적으로 root 그룹
            #  mode: 400
        healthcheck:
            test:
                - "CMD-SHELL"
                - |
                    if [ -f /certs/server.crt ]; then
                        curl -fk https://localhost:3000/api/healthz
                    else
                        curl -f http://localhost:3000/api/healthz
                    fi
            interval: 30s
            timeout: 10s
            retries: 5

    # ====================================================================
    # 8. Container Management (Portainer)
    # 브라우저에서 실행 중인 컨테이너 상태를 모니터링하고 클릭으로 끄고 켤 수 있는 도구입니다.
    # prod, dev, dev.ssl 환경을 분리하지 못함
    #  -> 인증서가 없어도 인증서를 자체적으로 만들어서 구분할 필요가 없음
    # ====================================================================
    portainer:
        image: portainer/portainer-ce:latest
        container_name: portainer
        restart: always
        # entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint-wrapper.sh"] # shell 자체가 없어 실행불가
        environment:
            - TZ=Asia/Seoul
        ports:
            - "127.0.0.1:9443:9443"
            - "127.0.0.1:9080:9000" # MinIO의 9000 포트와 겹치지 않게 호스트에서는 9080로 접속합니다.
            - "127.0.0.1:8000:8000" # Edge Agent용 포트
        volumes:
            # [중요] Podman 소켓 연결 (Rootless 환경에서는 경로 확인 필요)
            - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
            # - ./portainer/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro # shell 자체가 없어 실행불가
            - ./data/portainer:/data # 포테이너 환경 설정 데이터 저장
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - sfms-net
        secrets:
            - source: portainer-password
              target: /run/secrets/portainer-password
            #  uid: "0"    # 기본적으로 root 유저
            #  gid: "0"    # 기본적으로 root 그룹
            #  mode: 0400
            - source: portainer-key
              target: /certs/key.pem # 기본 파일명
            #   uid: "0"    # 기본적으로 root 유저
            #   gid: "0"    # 기본적으로 root 그룹
            #   mode: 0400
            - source: portainer-crt
              target: /certs/cert.pem # 기본 파일명
            #   uid: "0"    # 기본적으로 root 유저
            #   gid: "0"    # 기본적으로 root 그룹
            #   mode: 0444
            - source: portainer-ca-crt
              target: /certs/ca.crt

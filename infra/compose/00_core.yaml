services:
    # ====================================================================
    # 1. Database (PostgreSQL 16 + PGroonga)
    # SFMS의 모든 메인 데이터가 저장되는 핵심 관계형 데이터베이스입니다.
    # ====================================================================
    # 1. Database (PostgreSQL 16 + Custom PGroonga & pg_cron)
    # 한글 검색 최적화 및 스케줄러가 포함된 커스텀 이미지를 빌드하여 실행합니다.
    #   - Containerfile build시, 각종 스클립트가 참조하는 파일을 컨테이너 내부로 복사합니다.
    #     ex) 00_configure_system.sh 스크립트가 참조하는 SSL 키를
    pgsql:
        # infra/pgsql 폴더에 있는 Dockerfile을 읽어 직접 이미지를 생성합니다.
        # profiles: ["", "dev", "prod"]
        # build: ${PWD}/pgsql
        image: groonga/pgroonga:latest-debian-16
        container_name: pgsql
        shm_size: '1gb'
        restart: always
        # entrypoint/command 는 컨테이너를 만들때 적용해서 필요없음
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD_FILE=/run/secrets/pgsql-password
            # scram-sha-256 인증 방식을 강제하여 보안을 강화합니다.
            - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --data-checksums
            - TZ=Asia/Seoul
        volumes:
            # 초기화 스크립트
            - ${PWD}/pgsql/sql/10_global_init.sql:/docker-entrypoint-initdb.d/10_global_init.sql:ro
            - ${PWD}/pgsql/sql/30_app_db_init_sfms.sql:/docker-entrypoint-initdb.d/30_app_db_init_sfms.sql:ro
            # 데이터파일
            # Bind Mount: 로컬 폴더를 직접 마운트하여 데이터 영구 보존 및 호스트에서 직접 접근 가능
            - ${PWD}/data/pgsql:/var/lib/postgresql/data:Z
            # Named Volume: Docker 볼륨을 사용하여 데이터 영구 보존 (로컬 폴더 대신 볼륨 사용 시)
            # - pgsql-data:/var/lib/postgresql/data:Z
            # 로그파일
            - ${PWD}/data/logs/pgsql:/var/log/postgresql

        networks:
            - sfms-net
        secrets:
            # secrets를 마운트할 때 권한 설정
            # 파일의 소유자 및 그룹에 상관없이 컨테이너 안에서 필요한 소유자 및 그룹을 변경
            # 파일의 속성에 상관없이 컨테이너 안에서 필요한 파일 속성으로 변경
            - source: pgsql-password
              target: /run/secrets/pgsql-password
            #   uid: "999"
            #   gid: "999"
            #   mode: 400

        healthcheck:
            # -q(quiet) 옵션을 추가하면 로그가 더 깔끔해집니다.
            test: ["CMD-SHELL", "pg_isready -q -d ${DB_NAME} -U ${DB_USER}"]
            interval: 10s # 10초마다 상태 확인
            timeout: 5s # 5초 안에 응답 없으면 실패로 간주
            retries: 5 # 5번 연속 실패 시 'unhealthy' 상태로 변경
            start_period: 30s # health check 시작 지연

    # ====================================================================
    # 2. Cache & Session Store (Redis)
    # 잦은 DB 조회를 줄이고 API 응답 속도를 높이기 위한 인메모리 캐시입니다.
    # ====================================================================
    redis:
        image: redis:7-alpine
        container_name: redis
        restart: always
        # command는 컨테이너가 실행될 때 기본으로 실행할 실행 파일(또는 프로세스)을 덮어쓰는 명령어입니다.
        # 데이터를 메모리에만 두지 않고 디스크에도 주기적으로 저장(--appendonly yes)하고, 비밀번호 설정
        entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint-wrapper.sh"]
        # command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password123!} -> 래퍼 스크립트에서 처리하도록 이동
        environment:
            - TZ=Asia/Seoul
        # 로컬 개발 환경에서 직접 접속하기 위해 개방
        # FastAPI 백엔드가 Redis에 직접 캐시를 넣고 뺄 수 있도록 포트 개방
        volumes:
            # 설정 파일 및 래퍼 스크립트 매핑
            - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
            - ./redis/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
            # 캐시 데이터 영구 보존용 로컬 폴더
            - ./data/redis:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - sfms-net
        secrets:
            - source: redis-password
              target: /run/secrets/redis-password
            #   uid: "999" # alpine 기반 redis 유저
            #   gid: "999" # alpine 기반 redis 그룹
            #   mode: 400
        healthcheck:
            test:
                - "CMD-SHELL"
                - |
                    PASS=$$(cat /run/secrets/redis-password 2>/dev/null || echo "")
                    if [ -f /certs/server.cert ]; then
                        redis-cli --tls --cacert /certs/ca.cert --cert /certs/server.cert --key /certs/server.key -a "$$PASS" ping
                    else
                        redis-cli -a "$$PASS" ping
                    fi
            interval: 10s
            timeout: 5s
            retries: 5

    # ====================================================================
    # 3. S3 Compatible Storage (MinIO)
    # 도면, 보고서, 현장 이미지 등 대용량 파일을 아마존 S3와 동일한 방식으로 저장합니다.
    # ====================================================================
    minio:
        image: minio/minio:latest
        container_name: minio
        restart: always
        entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint-wrapper.sh"]
        command: server /data --console-address ":9001" # 관리자용 웹 콘솔 주소 지정
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER} # 최고 관리자 계정 아이디
            - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio-password # 최고 관리자 비밀번호 (시크릿 파일 사용)
            - TZ=Asia/Seoul
        volumes:
            - ./minio/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
            - ./data/minio:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - sfms-net
        secrets:
            - source: minio-password
              target: /run/secrets/minio-password
            #   uid: "0" # 기본적으로 root 유저
            #   gid: "0" # 기본적으로 root 그룹
            #   mode: 400
        healthcheck:
            test:
                - "CMD-SHELL"
                - |
                    if [ -f /root/.minio/certs/public.crt ]; then
                        curl -fk https://localhost:9000/minio/health/live
                    else
                        curl -f http://localhost:9000/minio/health/live
                    fi
            interval: 30s
            timeout: 20s
            retries: 3
    # # ====================================================================
    # # 4. Backend (FastAPI)
    # # 비즈니스 로직을 처리하고 프론트엔드와 DB 사이의 통신을 담당하는
    # # API 서버입니다.
    # # ====================================================================
    # backend:
    #     # build: ../backend
    #     image: sfms-backend:latest # 소스코드를 빌드한 도커 이미지 사용
    #     container_name: sfms-backend
    #     depends_on:
    #         pgsql:
    #             condition: service_healthy
    #         redis:
    #             condition: service_healthy
    #         minio:
    #             condition: service_healthy
    #     restart: always
    #     environment:
    #         # 운영에서는 외부에서 Nginx를 거치므로 S3_ENDPOINT 주소를 외부 도메인에 맞게 조정
    #         - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    #         - REDIS_URL=redis://:${REDIS_PASSWORD:-password123!}@redis:6379/0
    #         - S3_ENDPOINT=http://minio:9000
    #         - TZ=Asia/Seoul
    #     volumes:
    #         # 운영 환경에서는 보안과 안정성을 위해 이미지 빌드 시 소스 코드를 포함.
    #         # - ../backend:/app
    #         - ./data/logs/backend:/app/logs
    #         - /etc/timezone:/etc/timezone:ro
    #         - /etc/localtime:/etc/localtime:ro
    #     networks:
    #         - sfms-net
    #     secrets:
    #         - source: sfms-backend-password
    #           target: /run/secrets/sfms-backend-password
    #           uid: "1000" # 기본적으로 appuser 유저
    #           gid: "0" # 기본적으로 appuser 그룹
    #           mode: 0400
    #         # - source: sfms-backend-key
    #         #   target: /run/secrets/sfms-backend-key
    #         #   uid: "1000"    # 기본적으로 appuser 유저
    #         #   gid: "1000"    # 기본적으로 appuser 그룹
    #         #   mode: 0400
    #         # - source: sfms-backend-cert
    #         #   target: /run/secrets/sfms-backend-cert
    #         #   uid: "1000"    # 기본적으로 appuser 유저
    #         #   gid: "1000"    # 기본적으로 appuser 그룹
    #         #   mode: 0444

    # # ====================================================================
    # # 5. Gateway + frontend(Nginx)
    # # 외부의 트래픽을 받아 프론트엔드나 백엔드로 알맞게 분배해주는 리버스
    # # 프록시 서버입니다.
    # # ====================================================================
    # nginx:
    #     image: nginx:alpine
    #     container_name: sfms-nginx
    #     depends_on:
    #         - sfms-backend
    #         - sfms-frontend
    #     restart: always
    #     entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint-wrapper.sh"]
    #     environment:
    #         - TZ=Asia/Seoul
    #     ports:
    #         # 외부 클라이언트가 유일하게 접속하는 포트
    #         - "80:80" # HTTP 기본 포트
    #         - "443:443" # HTTPS 보안 포트
    #     volumes:
    #         - ./nginx/scripts/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
    #         # 로그 저장을 위한 볼륨 매핑
    #         - ./data/logs/nginx:/var/log/nginx
    #         - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    #         - ./nginx/certs:/etc/nginx/certs:ro
    #         # (선택 사항) 만약 Nginx가 프론트엔드 파일을 직접 서빙한다면?
    #         # - ./frontend/dist:/usr/share/nginx/html:ro
    #         - /etc/timezone:/etc/timezone:ro
    #         - /etc/localtime:/etc/localtime:ro
    #     networks:
    #         - sfms-net
    #     secrets:
    #         - source: nginx-password
    #           target: /run/secrets/nginx-password

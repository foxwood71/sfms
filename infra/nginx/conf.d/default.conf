server {
    listen 80;
    server_name localhost;

    # 로그 설정 (오빠가 정해준 경로 유지)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # 1. Frontend: 통합된 정적 파일 서빙 (SPA 라우팅 지원)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React/Vite SPA를 위해 경로가 없으면 index.html로 보냅니다.
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend API: 백엔드 컨테이너로 전달
    location /api {
        # compose 서비스 이름인 'api'를 사용합니다.
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # 3. MinIO Console: 파일 관리 화면 전달
    location /minio/ {
        # 뒤에 /를 붙여서 경로 처리를 깔끔하게 합니다.
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket 지원 (MinIO 콘솔 필수 옵션)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 4. 백엔드 문서(Swagger) 프록시
    location /docs {
        proxy_pass http://api:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }
}

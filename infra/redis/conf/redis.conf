# Redis 기본 보안 및 성능 설정
bind 0.0.0.0
port 6379

# 성능 및 데이터 보존
appendonly yes
appendfsync everysec

user default off
user sfms_user on >your_secure_password ~* +@all
aclfile /etc/redis/users.acl

# 보안 설정 (비밀번호는 환경변수로 주입 가능하지만 파일에서도 정의 가능)
# requirepass ${REDIS_PASSWORD}  # 실제 구동 시에는 환경변수 우선

# 보안 설정은 래퍼 스크립트에서 환경변수로 주입
# port 0 # 일반 포트닫기
# tls-port 6379
# tls-cert-file /certs/server.cert
# tls-key-file /certs/server.key
# tls-ca-cert-file /certs/ca.cert
#
# 클라이언트에게 인증서를 요구할지 여부 (보통 'yes' 권장)
# tls-auth-clients yes